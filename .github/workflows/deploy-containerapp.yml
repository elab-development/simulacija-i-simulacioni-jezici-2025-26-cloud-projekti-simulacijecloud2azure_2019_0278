name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/cloud2-min-app:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cloud2-min-app:${{ github.sha }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name cloud2-min-app \
            --resource-group rg-cloud2-mixa \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/cloud2-min-app:${{ github.sha }}
